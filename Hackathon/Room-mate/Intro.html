<!DOCTYPE html>
<html>

<head>
    <title>Room-mate Intro</title>
</head>

<body>

    <h1>Room-mate</h1>

    <p>We are here to find you a new Room-mate</p>

    <p> Submit your information here:</p>

    <form>
        <label for ="Student Name"> Student Name </label>
        <input type="text" placeholder=" Enter your name:"> <br> <br>

        <label for = "Major"> Student Major </label>
        <input type ="text" placeholder= " Enter your major:"> <br> <br>
    </form>

    <label for ="Time Person"> Are you a early riser or night owl? </label>
    <select name = "Time Person">
        <option value = "Early Riser"> Early Riser </option>
        <option value = "Night Owl"> Night Owl </option>
    </select>
    <br> <br>

    <label for = "Housing Location"> Which housing location are you moving to? </label>
    <select name = "Housing Location">
        <option value = "CMRC"> CMRC </option>
        <option value = "ELLC"> ELLC </option>
        <option value = "Haley Hall"> Haley Hall </option>
    </select>
    <br> <br>

    <form>
        <label for = "Student Activities"> What student activities are you a part of? </label>
        <input type = "text" placeholder = "Enter the different student activities: "></input>
    </form>

    <button> Submit Housing Profile </button>
</body>

</html>
